<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.pikachu {
  width: 600px;
  height: 600px;
  background-size: cover;
  animation: rotate 5s linear infinite;
  /* transition: transform 5s ease-in-out 1s;  */
}

.pikachu:hover {
  animation: hover-move 2s ease-in-out infinite;
}

@keyframes hover-move {
  0% {
    transform: translate(0, 0);
  }
  25% {
    transform: translate(20px, -20px);
  }
  50% {
    transform: translate(40px, 0);
  }
  75% {
    transform: translate(20px, 20px);
  }
  100% {
    transform: translate(0, 0);
  }
}


@keyframes rotate {
  0% {
    background-image: url("https://images.pexels.com/photos/1716861/pexels-photo-1716861.jpeg?auto=compress&cs=tinysrgb&w=400");
    transform: rotate(0deg);
    transform: translateX(100%);
  }
  25% {
    background-image: url("https://images.pexels.com/photos/6397725/pexels-photo-6397725.jpeg?auto=compress&cs=tinysrgb&w=400");
    transform: rotate(25deg);
    transform: translateY(100%);
  }
  50% {
    background-image: url("https://images.pexels.com/photos/7465581/pexels-photo-7465581.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2");
    transform: rotate(180deg);
}
  75% {
    background-image: url("https://images.pexels.com/photos/6897771/pexels-photo-6897771.jpeg?auto=compress&cs=tinysrgb&w=400");
    transform: rotate(255deg)
}
  100% {
    background-image: url("https://images.pexels.com/photos/6898855/pexels-photo-6898855.jpeg?auto=compress&cs=tinysrgb&w=400");
  
    transform: rotate(360deg)
}
}

@keyframes pulse{
    0%,100%{
        transform: translateX(50%);
        
    }

    33%{
        transition: scale(1.05);
    }
}


    </style>
</head>
<body>
    
        <div class="pikachu">
                   </div>
    
</body>
</html>
