align-items: This property is used to align items vertically along the cross-axis of a container.

 For example, if the flex-direction is set to "row," the cross-axis is vertical. The align-items

justify-content: This property is used to align items horizontally along the main-axis of a container.
 It controls the horizontal alignment of the items within the container. The justify-content property

  among others. These values determine how the available space is distributed between and around the 
  items along the main-axis.
