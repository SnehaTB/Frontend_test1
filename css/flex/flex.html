<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .flex-container{
            display: flex;
            flex-wrap: wrap;
            height: 600px;
            width: 400px;
            background-color: beige;
            justify-content: space-evenly;
        }

        .flex-item{
            flex: 0 1 100px; /* Example width for flex items */
            height: 150px;
            width: 300px;
            padding: 10px;
            margin: 3px;
            margin-top: 30px;
            background-color: coral;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-item">Item 1</div>
        <div class="flex-item">Item 2</div>
        <div class="flex-item">Item 3</div>
        <div class="flex-item">Item 4</div>
        <div class="flex-item">Item 5</div>
        <div class="flex-item">Item 6</div>
        <div class="flex-item">Item 7</div>
        <div class="flex-item">Item 8</div>
        <div class="flex-item">Item 9</div>
      </div>
</body>
</html>

<!-- The flex-wrap property in CSS is used to control whether flex items should wrap or stay on a single line when there isn't enough space within the flex container. Here are the possible values of flex-wrap:

nowrap (default): This value indicates that the flex items should remain on a single line, even if they overflow the container. The items will shrink if necessary to fit within the container.

wrap: This value allows the flex items to wrap to multiple lines when there isn't enough space horizontally. The items will be arranged in rows, with each row having as many items as possible before wrapping to the next line.

wrap-reverse: This value is similar to wrap, but it wraps the flex items in the reverse order. The items will be arranged in rows from bottom to top -->


<!-- The flex: 1 0 200px; shorthand property in CSS combines three individual flex-related properties: flex-grow, flex-shrink, and flex-basis. Each value in the shorthand represents these properties in the following order:

flex-grow: Specifies the ability of a flex item to grow and occupy the available space. It determines how the remaining space is distributed among flex items. A value of 1 means the item can grow proportionally to other flex items. If multiple flex items have a flex-grow value of 1, they will share the remaining space equally. If an item has a flex-grow value of 0, it won't grow and will only take up its specified flex-basis.

flex-shrink: Specifies the ability of a flex item to shrink when there is not enough space to accommodate all items. It determines how much an item can shrink relative to other flex items. A value of 1 means the item can shrink proportionally with other flex items. If multiple items have a flex-shrink value of 1, they will shrink equally. If an item has a flex-shrink value of 0, it won't shrink.

flex-basis: Specifies the initial size of a flex item before the available space is distributed. It sets the base width or height of the item. In this case, 200px is used as the value, indicating that the initial size of the flex item is 200px.

So, when you set flex: 1 0 200px;, it means:

The flex item can grow (flex-grow: 1) and will share the remaining space with other flex items.
The flex item won't shrink (flex-shrink: 0), so it will maintain its size unless there is not enough space.
The flex item's initial size (flex-basis) is set to 200px.
This shorthand property simplifies the process of setting multiple flex-related properties in a single declaration, making it more concise and convenient.

By adjusting the values of flex-grow, flex-shrink, and flex-basis individually or using the shorthand,
 you can control the behavior of flex items within a flex container, influencing their growth, 
 shrinkage, and initial size.

 -->

 <!-- Yes, you can set both flex-grow and flex-shrink to 1 together
If there is extra space, all flex items with flex-grow: 1 will grow proportionally to fill the space. If there is not enough space, all items with flex-shrink: 1 will shrink proportionally to fit within the container. -->
